{% load tailwind_tags %}
<!doctype html>
<html>
  <head>
    {% tailwind_css %}
  </head>
  <header
    id="navbar"
    class="fixed top-0 right-0 h-16 flex border-b border-b-gray-200 items-center px-6 gap-4 z-30 transition-all duration-300 bg-white dark:border-b-gray-700"
    style="
      left: 256px;
      box-shadow: 0 1px 12px rgba(15, 23, 42, 0.04);
    "
  >
    <!-- Breadcrumb -->
    <div class="flex items-center gap-1.5 flex-1  text-gray-500 text-[16px]">
      <span>Home</span>
      <span>/</span>
      <span class="text-gray-900 font-semibold">Dashboard</span>
    </div>

    <!-- Search -->
    <button
      class="flex items-center gap-2 rounded-xl px-3 py-2 transition hover:opacity-80 bg-gray-100 text-gray-500 text-sm min-w-[200px] border border-gray-200"
    >
      <!-- search icon -->
      <svg
        class="w-4 h-4"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
      >
        <path
          stroke-width="2"
          d="M21 21l-4.3-4.3m1.8-5.2a7 7 0 11-14 0 7 7 0 0114 0z"
        />
      </svg>

      <span>Search anything...</span>

      <span class="ml-auto flex items-center gap-0.5 opacity-60 text-xs">
        <!-- command icon -->
        <svg
          class="w-3 h-3"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
        >
          <path
            stroke-width="2"
            d="M6 9a3 3 0 110-6 3 3 0 010 6zm12 0a3 3 0 110-6 3 3 0 010 6zM6 21a3 3 0 110-6 3 3 0 010 6zm12 0a3 3 0 110-6 3 3 0 010 6z"
          />
        </svg>
        <span>K</span>
      </span>
    </button>

    <!-- Actions -->
    <div class="flex items-center gap-2">
      <!-- Dark toggle -->
      <button id="themeToggle" 
        class="w-9 h-9 rounded-xl flex items-center justify-center transition hover:scale-105 bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300">
    <!-- Sun icon (visible in dark mode) -->
    <svg id="sunIcon" 
         class="w-4 h-4 hidden dark:block" 
         xmlns="http://www.w3.org/2000/svg" 
         width="20" height="20" 
         viewBox="0 0 24 24" 
         fill="none" 
         stroke="currentColor" 
         stroke-width="2" 
         stroke-linecap="round" 
         stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2"/>
        <path d="M12 20v2"/>
        <path d="m4.93 4.93 1.41 1.41"/>
        <path d="m17.66 17.66 1.41 1.41"/>
        <path d="M2 12h2"/>
        <path d="M20 12h2"/>
        <path d="m6.34 17.66-1.41 1.41"/>
        <path d="m19.07 4.93-1.41 1.41"/>
    </svg>

    <!-- Moon icon (visible in light mode) -->
    <svg id="moonIcon" 
         class="w-4 h-4 block dark:hidden" 
         viewBox="0 0 24 24" 
         fill="none" 
         stroke="currentColor">
        <path stroke-width="2" d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z" />
    </svg>
</button>



      <!-- notifications -->
      <button
        @click="toggleNotification()"
        class="relative w-9 h-9 rounded-xl flex items-center justify-center bg-gray-200 text-gray-600"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-bell-icon lucide-bell"
        >
          <path d="M10.268 21a2 2 0 0 0 3.464 0" />
          <path
            d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"
          />
        </svg>
        {% if unread_count  %}
        <span
          class="absolute -top-1 -right-1 w-4 h-4 text-white text-[11px] rounded-full bg-red-500"
        >
        {{ unread_count }}
      </span>
       {% endif %}
      </button>

      <!-- avatar -->
      <button
        class="flex items-center gap-2 rounded-xl px-2 py-1.5 border border-gray-200 hover:bg-gray-100"
      >
        <div
          class="w-7 h-7 rounded-full flex items-center justify-center bg-linear-to-br from-indigo-600 to-purple-600 text-white text-[11px] font-bold"
        >
          AJ
        </div>

        <svg
          class="w-3 h-3 text-gray-500"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
        >
          <path stroke-width="2" d="M6 9l6 6 6-6" />
        </svg>
      </button>
    </div>
  </header>
  
</html>
