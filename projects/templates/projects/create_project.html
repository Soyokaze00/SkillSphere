<h1>Create Project</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <h3>Project Details</h3>
    {{ project_form.as_p }}

    <h3>Upload Initial File (Optional)</h3>
    {{ file_form.as_p }}

    <button type="submit">
        Create Project
    </button>
</form>

<a href="{% url 'projects:project-list' %}">
    Back to Projects
</a>
