<h2>Enter Email</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Send Code</button>
</form>

{% if form.errors %}
    <div style="color:red;">
        {{ form.errors }}
    </div>
{% endif %}

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}
