{% extends "users/auth_base.html" %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html>
<head>
    {% tailwind_css %}
</head>

{% block auth_content %}
<!-- LOGIN VIEW -->
<div id="loginView">
    <h1 class="text-[28px] font-extrabold text-slate-900 tracking-[-0.5px]">
        Welcome back
    </h1>
    <p class="mt-1 text-sm text-slate-500">
        Sign in to your SkillSphere account
    </p>

    <!-- Error Messages from Django -->
    {% if error %}
    <div class="mt-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm">
        {{ error }}
    </div>
    {% endif %}

    <div class="flex items-center justify-center">
        <a href="/accounts/github/login/" class="w-full grid mt-8">
            <button type="button"
                class="flex items-center justify-center gap-2 rounded-xl py-2.5 border-[1.5px] border-slate-200 bg-slate-50 text-[13px] font-medium text-slate-900 transition hover:opacity-80 active:scale-95">
                <!-- GitHub Icon SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-github">
                    <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
                    <path d="M9 18c-4.51 2-5-2-7-2"></path>
                </svg>
                GitHub
            </button>
        </a>
    </div>

    <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-slate-200"></div>
        <span class="text-xs text-slate-500">or continue with email</span>
        <div class="flex-1 h-px bg-slate-200"></div>
    </div>

    <!-- Django Form -->
    <form id="loginForm" class="space-y-4" method="POST">
        {% csrf_token %}

        <div class="relative">
            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                <i data-lucide="mail" class="w-4 h-4"></i>
            </div>
            <input required type="text" name="username" placeholder="Username or Email"
                class="w-full rounded-xl pl-10 pr-4 py-3 bg-slate-50 border-[1.5px] border-slate-200 text-slate-900 text-sm outline-none transition focus:border-indigo-600" />
        </div>

        <div class="relative">
            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                <i data-lucide="lock" class="w-4 h-4"></i>
            </div>
            <input required id="loginPassword" type="password" name="password" placeholder="Password"
                class="w-full rounded-xl pl-10 pr-10 py-3 bg-slate-50 border-[1.5px] border-slate-200 text-slate-900 text-sm outline-none transition focus:border-indigo-600" />
            <div class="absolute right-3 top-1/2 -translate-y-1/2">
                <button type="button" id="toggleLoginPassword" class="text-slate-400">
                    <i id="loginEyeIcon" data-lucide="eye" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <div class="flex justify-end">
            <button type="button" class="text-[13px] text-indigo-600 font-medium">
                Forgot password?
            </button>
        </div>

        <button type="submit"
            class="w-full flex items-center justify-center gap-2 rounded-xl py-3 bg-linear-to-br from-[#17134b] to-[#13122f] text-white font-semibold text-[15px] transition hover:opacity-90 active:scale-95">
            <span>Sign In</span>
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
    </form>

    <p class="text-center mt-6 text-[13px] text-slate-500">
        Don't have an account?
        <a href="{% url 'users:email-verification' %}" class="text-indigo-600 font-semibold">
            Sign up free
        </a>
    </p>
</div>

<!-- Scripts for UI Interactivity -->
<script>
    // Toggle Password Visibility
    const loginPassword = document.getElementById("loginPassword");
    const loginEyeIcon = document.getElementById("loginEyeIcon");
    const toggleBtn = document.getElementById("toggleLoginPassword");

    toggleBtn.addEventListener("click", () => {
        const isPass = loginPassword.type === "password";
        loginPassword.type = isPass ? "text" : "password";
        loginEyeIcon.setAttribute("data-lucide", isPass ? "eye-off" : "eye");
        lucide.createIcons();
    });

    // Initialize Lucide Icons
    lucide.createIcons();
</script>
{% endblock %}
