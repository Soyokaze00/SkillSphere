{% load tailwind_tags %}
<!DOCTYPE html>
<html>
<head>
    {% tailwind_css %}
</head>
    <header id="navbar"
  class="fixed top-0 right-0 h-16 flex items-center px-6 gap-4 z-30 transition-all duration-300 bg-white"
  style="left: 240px; border-bottom: 1px solid var(--border); box-shadow: 0 1px 12px rgba(15,23,42,0.04);">

  <!-- Breadcrumb -->
  <div class="flex items-center gap-1.5 flex-1 text-[13px] text-gray-500">
    <span>Home</span>
    <span>/</span>
    <span class="text-gray-900 font-semibold">Dashboard</span>
  </div>

  <!-- Search -->
  <button
    class="flex items-center gap-2 rounded-xl px-3 py-2 transition hover:opacity-80
           bg-gray-100 text-gray-500 text-sm min-w-[200px] border border-gray-200">
    
    <!-- search icon -->
    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path stroke-width="2" d="M21 21l-4.3-4.3m1.8-5.2a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>

    <span>Search anything...</span>

    <span class="ml-auto flex items-center gap-0.5 opacity-60 text-xs">
      <!-- command icon -->
      <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path stroke-width="2" d="M6 9a3 3 0 110-6 3 3 0 010 6zm12 0a3 3 0 110-6 3 3 0 010 6zM6 21a3 3 0 110-6 3 3 0 010 6zm12 0a3 3 0 110-6 3 3 0 010 6z"/>
      </svg>
      <span>K</span>
    </span>
  </button>

  <!-- Actions -->
  <div class="flex items-center gap-2">

    <!-- Dark toggle -->
    <button
      class="w-9 h-9 rounded-xl flex items-center justify-center transition hover:scale-105 bg-gray-200 text-gray-600">
      <!-- sun -->
      <svg class="w-4 h-4 hidden dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path stroke-width="2" d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364-6.364-1.414 1.414M7.05 16.95l-1.414 1.414m0-11.314L7.05 7.05m9.9 9.9 1.414 1.414"/>
      </svg>

      <!-- moon -->
      <svg class="w-4 h-4 block dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path stroke-width="2" d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>
      </svg>
    </button>

    <!-- notifications -->
    <button class="relative w-9 h-9 rounded-xl flex items-center justify-center bg-gray-200 text-gray-600">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path stroke-width="2" d="M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7"/>
      </svg>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-red-500"></span>
    </button>

    <!-- avatar -->
    <button class="flex items-center gap-2 rounded-xl px-2 py-1.5 border border-gray-200 hover:bg-gray-100">
      <div class="w-7 h-7 rounded-full flex items-center justify-center
                  bg-gradient-to-br from-indigo-600 to-purple-600 text-white text-[11px] font-bold">
        AJ
      </div>

      <svg class="w-3 h-3 text-gray-500" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path stroke-width="2" d="M6 9l6 6 6-6"/>
      </svg>
    </button>

  </div>
</header>
</html>
